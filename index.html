<!DOCTYPE html>
<html lang="en">
<head>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        :root {
            --midnight: #1E2D40;
            --teal: #1A8B8B;
            --ember: #F0684C;
            --cloud: #F7F8FA;
            --graphite: #2C2C2C;
        }
        *, *::before, *::after { box-sizing: border-box; }

        h1, h2, h3, h4, .serif { font-family: 'DM Serif Display', serif; }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--cloud);
            color: var(--graphite);
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }

        /* Selection */
        ::selection { background-color: var(--teal); color: white; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--cloud); }
        ::-webkit-scrollbar-thumb { background: var(--midnight); border-radius: 99px; }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.96); }
            to   { opacity: 1; transform: scale(1); }
        }
        .anim-fadeUp  { animation: fadeUp  0.55s ease-out both; }
        .anim-fadeIn  { animation: fadeIn  0.4s ease-out both; }
        .anim-scaleIn { animation: scaleIn 0.45s ease-out both; }

        .delay-1 { animation-delay: 0.08s; }
        .delay-2 { animation-delay: 0.16s; }
        .delay-3 { animation-delay: 0.24s; }
        .delay-4 { animation-delay: 0.32s; }
        .delay-5 { animation-delay: 0.40s; }
        .delay-6 { animation-delay: 0.48s; }

        /* Nav active pill */
        .nav-pill {
            transition: background 0.25s, color 0.25s, transform 0.2s;
        }
        .nav-pill:hover { transform: translateY(-1px); }

        /* Card hover */
        .card-hover {
            transition: box-shadow 0.3s, transform 0.3s, border-color 0.3s;
        }
        .card-hover:hover {
            box-shadow: 0 20px 60px -15px rgba(30,45,64,0.15);
            transform: translateY(-3px);
        }

        /* Metric card */
        .metric-card {
            transition: box-shadow 0.3s, transform 0.3s;
        }
        .metric-card:hover {
            box-shadow: 0 24px 50px -12px rgba(30,45,64,0.18);
            transform: translateY(-4px);
        }

        /* Tool tag */
        .tool-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            background: rgba(26,139,139,0.10);
            color: var(--teal);
            border: 1px solid rgba(26,139,139,0.2);
        }

        /* Progress bar */
        .progress-track {
            background: #eef0f3;
            border-radius: 99px;
            height: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 99px;
            background: linear-gradient(90deg, var(--teal), #22b8b8);
            transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
        }

        /* Gradient mesh bg on header */
        .header-mesh {
            background:
                radial-gradient(ellipse 600px 400px at 80% 40%, rgba(26,139,139,0.13) 0%, transparent 70%),
                radial-gradient(ellipse 400px 300px at 10% 70%, rgba(240,104,76,0.09) 0%, transparent 60%),
                var(--midnight);
        }

        /* Tab underline highlight */
        .tab-active-bar {
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 2px;
            border-radius: 99px;
            background: var(--teal);
        }

        /* Divider with label */
        .divider-label {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .divider-label::before,
        .divider-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e6eb;
        }

        /* Footer glow */
        .footer-glow {
            background:
                radial-gradient(ellipse 800px 400px at 20% 50%, rgba(26,139,139,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 400px 300px at 90% 80%, rgba(240,104,76,0.08) 0%, transparent 50%),
                var(--midnight);
        }

        /* Responsive tweaks */
        @media (max-width: 768px) {
            .nav-scroll { overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
            .nav-scroll::-webkit-scrollbar { display: none; }
        }
    </style>
</head>

                    <div className="bg-white rounded-2xl shadow-xl border border-slate-100 p-2">
                        <div className="nav-scroll flex gap-1">
                            {tabs.map((tab) => {
                                const active = activeTab === tab.id;
                                const Icon = tab.icon;
                                return (
                                    <button
                                        key={tab.id}
                                        onClick={() => switchTab(tab.id)}
                                        className={`nav-pill relative flex-1 min-w-max flex items-center justify-center gap-2 px-4 py-3 rounded-xl text-[10px] md:text-[11px] font-black uppercase tracking-[0.12em] ${active ? 'text-white' : 'text-slate-400 hover:text-slate-800 hover:bg-slate-50'}`}
                                        style={{ background: active ? 'var(--midnight)' : 'transparent' }}
                                    >
                                        <Icon className="w-3.5 h-3.5 flex-shrink-0" />
                                        <span className="hidden sm:inline">{tab.label}</span>
                                        <span className="sm:hidden">{tab.label.split(' ')[0]}</span>
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>

                {/* ── MAIN CONTENT ── */}
                <main ref={mainRef} className="max-w-5xl mx-auto w-full px-4 py-16 flex-grow">

                    {/* ─────────── TECH STACK ─────────── */}
                    {activeTab === 'landing' && (
                        <div>
                            {/* Impact metrics */}
                            <div className="mb-16">
                                <p className="divider-label text-[10px] font-black uppercase tracking-[0.35em] text-slate-400 mb-10">Executive Impact Dashboard</p>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {[
                                        { val: "14%",  label: "Churn Reduction",  desc: "ML-driven retention engine discovery and launch.", accent: "#1A8B8B" },
                                        { val: "40%",  label: "Velocity Increase", desc: "Automated Jira triage and workflow optimisation.", accent: "#F0684C" },
                                        { val: "98%",  label: "Model Accuracy",    desc: "Statistical validation for regional budget allocation.", accent: "#1E2D40" },
                                    ].map((m, i) => (
                                        <div key={i} className={`metric-card bg-white rounded-3xl p-8 text-center border border-slate-100 anim-fadeUp delay-${i+1}`}>
                                            <div className="text-6xl md:text-7xl serif font-normal mb-2 tracking-tight" style={{ color: m.accent }}>{m.val}</div>
                                            <div className="text-[9px] font-black uppercase tracking-[0.25em] mb-3" style={{ color: m.accent }}>{m.label}</div>
                                            <p className="text-xs text-slate-400 italic leading-relaxed">{m.desc}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Tools */}
                            <div className="mb-10 text-center">
                                <h2 className="text-4xl md:text-5xl font-normal serif tracking-tight mb-2" style={{ color: '#1E2D40' }}>
                                    Technical Infrastructure
                                </h2>
                                <p className="text-[11px] uppercase tracking-[0.35em] font-bold" style={{ color:'#1A8B8B' }}>
                                    The specialist engines driving enterprise results
                                </p>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                                {toolStack.map((tool, i) => {
                                    const Icon = tool.icon;
                                    const open = expandedTool === tool.name;
                                    return (
                                        <div key={i}
                                             className={`bg-white rounded-2xl border overflow-hidden transition-all duration-300 anim-fadeUp delay-${i+1} ${open ? 'shadow-2xl' : 'border-slate-100 shadow-sm card-hover'}`}
                                             style={{ borderColor: open ? '#1A8B8B' : '' }}>
                                            <button onClick={() => setExpandedTool(open ? null : tool.name)}
                                                    className="w-full p-6 flex items-center justify-between group text-left">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0"
                                                         style={{ background: open ? '#1A8B8B18' : '#f3f4f6' }}>
                                                        <Icon className="w-5 h-5" style={{ color: open ? '#1A8B8B' : '#94a3b8' }} />
                                                    </div>
                                                    <div>
                                                        <p className="text-base font-bold serif" style={{ color:'#1E2D40' }}>{tool.name}</p>
                                                        <p className="text-[9px] uppercase tracking-widest font-bold opacity-40 mt-0.5">{tool.cat}</p>
                                                    </div>
                                                </div>
                                                <div className={`w-6 h-6 flex items-center justify-center rounded-full transition-colors ${open ? 'bg-teal-50' : 'bg-slate-50 group-hover:bg-slate-100'}`}>
                                                    {open
                                                        ? <I.ChevronUp className="w-3.5 h-3.5" style={{ color:'#1A8B8B' }} />
                                                        : <I.ChevronDown className="w-3.5 h-3.5 text-slate-300" />}
                                                </div>
                                            </button>

                                            {/* Skill bar */}
                                            <div className="px-6 pb-4">
                                                <div className="progress-track">
                                                    <div className="progress-fill" style={{ width: open ? `${tool.skill}%` : '0%' }} />
                                                </div>
                                            </div>

                                            {open && (
                                                <div className="px-6 pb-6 anim-fadeIn">
                                                    <div className="pt-4 border-t border-slate-100 space-y-4">
                                                        <div>
                                                            <p className="text-[9px] font-black uppercase tracking-[0.2em] mb-1.5" style={{ color:'#F0684C' }}>Strategic Impact</p>
                                                            <p className="text-sm text-slate-500 leading-relaxed">{tool.impact}</p>
                                                        </div>
                                                        <div>
                                                            <p className="text-[9px] font-black uppercase tracking-[0.2em] mb-1.5" style={{ color:'#F0684C' }}>Productivity Output</p>
                                                            <p className="text-sm text-slate-500 leading-relaxed">{tool.productivity}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {/* ─────────── DOMAIN PAGES ─────────── */}
                    {activeTab !== 'landing' && domain && (
                        <div className="anim-fadeUp">
                            {/* Domain header */}
                            <div className="mb-12">
                                <Pill color={domain.color}>{domain.tagline}</Pill>
                                <h2 className="text-4xl md:text-6xl font-normal serif italic tracking-tight mt-3 mb-2" style={{ color:'#1E2D40' }}>
                                    {domain.title}
                                </h2>
                            </div>

                            {/* Domain metrics */}
                            <div className="grid grid-cols-3 gap-4 mb-14">
                                {domain.metrics.map((m, i) => (
                                    <div key={i} className={`metric-card bg-white rounded-2xl p-5 md:p-7 text-center border border-slate-100 anim-fadeUp delay-${i+1}`}>
                                        <div className="text-3xl md:text-4xl serif font-normal mb-1" style={{ color: domain.color }}>{m.val}</div>
                                        <div className="text-[8px] md:text-[10px] font-black uppercase tracking-widest mb-1" style={{ color: domain.color }}>{m.label}</div>
                                        <p className="text-[10px] text-slate-400 italic hidden md:block">{m.desc}</p>
                                    </div>
                                ))}
                            </div>

                            {/* Projects */}
                            <p className="divider-label text-[10px] font-black uppercase tracking-[0.35em] text-slate-400 mb-8">Featured Projects</p>
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-14">
                                {domain.projects.map((proj, i) => (
                                    <ProjectCard key={i} project={proj} color={domain.color} delay={`delay-${i+1}`} />
                                ))}
                            </div>

                            {/* Skills */}
                            <p className="divider-label text-[10px] font-black uppercase tracking-[0.35em] text-slate-400 mb-6">Core Competencies</p>
                            <div className="flex flex-wrap gap-3">
                                {domain.skills.map((s, i) => (
                                    <div key={i} className={`bg-white border border-slate-100 rounded-2xl px-5 py-3 text-sm font-medium text-slate-700 card-hover anim-fadeUp delay-${(i % 6) + 1}`}>
                                        {s}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </main>

                {/* ── CONNECT FOOTER ── */}
                <footer className="max-w-5xl mx-auto px-4 mb-16 w-full">
                    <div className="footer-glow rounded-3xl text-white p-10 md:p-14 relative overflow-hidden">
                        {/* Decorative circle */}
                        <div style={{ position:'absolute', right:'-80px', top:'-80px', width:'300px', height:'300px',
                                      borderRadius:'50%', border:'1px solid rgba(255,255,255,0.05)', pointerEvents:'none' }} />
                        <div style={{ position:'absolute', right:'-40px', top:'-40px', width:'200px', height:'200px',
                                      borderRadius:'50%', border:'1px solid rgba(255,255,255,0.05)', pointerEvents:'none' }} />

                        <div className="relative z-10 flex flex-col md:flex-row gap-12 items-start md:items-center">
                            {/* Left */}
                            <div className="flex-1">
                                <h3 className="text-4xl md:text-6xl font-normal serif italic mb-3">Let's Connect.</h3>
                                <p className="text-white/50 text-sm leading-relaxed mb-8 max-w-sm">
                                    Strategic leadership at the intersection of product, data, and ecosystem growth.
                                </p>
                                <div className="flex flex-wrap gap-3">
                                    <button onClick={() => setShowEmail(!showEmail)}
                                            style={{ background:'#F0684C' }}
                                            className="flex items-center gap-2 text-white px-7 py-3.5 rounded-xl font-black text-[10px] uppercase tracking-widest hover:opacity-90 transition-all">
                                        <I.Mail className="w-4 h-4" />
                                        {showEmail ? 'Close' : 'Email Me'}
                                    </button>
                                    <a href="assets/cv.pdf"
                                       className="flex items-center gap-2 border border-white/20 text-white/80 px-7 py-3.5 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-white/5 transition-all">
                                        <I.Download className="w-4 h-4" />
                                        Download CV
                                    </a>
                                </div>

                                {showEmail && (
                                    <div className="mt-5 p-5 bg-white/10 backdrop-blur-md rounded-2xl border border-white/15 flex items-center gap-4 max-w-sm anim-scaleIn">
                                        <div>
                                            <p className="text-[9px] font-black uppercase tracking-widest mb-1" style={{ color:'#1A8B8B' }}>Direct</p>
                                            <a href="mailto:kerenwangombe@gmail.com" className="text-sm font-bold hover:text-teal-400 transition-colors underline decoration-dotted underline-offset-4">
                                                kerenwangombe@gmail.com
                                            </a>
                                        </div>
                                        <button onClick={copyEmail}
                                                className="ml-auto p-2.5 bg-white/10 hover:bg-white/20 rounded-xl transition-all flex-shrink-0">
                                            {copied ? <I.Check className="w-4 h-4 text-green-400" /> : <I.Copy className="w-4 h-4 opacity-60" />}
                                        </button>
                                    </div>
                                )}
                            </div>

                            {/* Right */}
                            <div className="flex flex-col items-start md:items-end gap-6">
                                <div className="flex gap-5">
                                    <a href="https://www.linkedin.com/in/keren-wangombe/" target="_blank" rel="noopener noreferrer"
                                       className="w-12 h-12 rounded-2xl border border-white/15 flex items-center justify-center text-white/40 hover:text-white hover:border-white/40 transition-all">
                                        <I.Linkedin className="w-5 h-5" />
                                    </a>
                                    <a href="#"
                                       className="w-12 h-12 rounded-2xl border border-white/15 flex items-center justify-center text-white/40 hover:text-white hover:border-white/40 transition-all">
                                        <I.Github className="w-5 h-5" />
                                    </a>
                                </div>
                                <div className="text-right">
                                    <p className="text-[9px] font-black uppercase tracking-[0.5em] text-white/25">Architecture-Driven Strategy</p>
                                    <p className="serif italic text-sm mt-1" style={{ color:'rgba(26,139,139,0.6)' }}>v2.6.0</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </footer>

                {/* ── BOTTOM STRIP ── */}
                <div className="border-t border-slate-100 bg-white py-8 px-6">
                    <div className="max-w-5xl mx-auto flex justify-between items-center gap-6">
                        <p className="serif italic text-sm" style={{ color:'#1E2D40' }}>
                            © 2026 Keren Wang'ombe — Built with Data &amp; Logic
                        </p>
                        <button onClick={() => window.scrollTo({ top:0, behavior:'smooth' })}
                                className="flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-slate-800 transition-all group">
                            <span>Top</span>
                            <div className="w-8 h-8 rounded-full border-2 border-slate-200 group-hover:border-slate-800 flex items-center justify-center transition-colors">
                                <I.ArrowUp className="w-3.5 h-3.5" />
                            </div>
                        </button>
                    </div>
                </div>
            </div>
        );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
