    <style>
        :root {
            --midnight: #1E2D40;

            --graphite: #2C2C2C;
        }
        *, *::before, *::after { box-sizing: border-box; }
        h1, h2, h3, h4, .serif { font-family: 'DM Serif Display', serif; }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--cloud);
            color: var(--graphite);
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }
        ::selection { background-color: var(--teal); color: white; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--cloud); }
        ::-webkit-scrollbar-thumb { background: var(--midnight); border-radius: 99px; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.96); }
            to   { opacity: 1; transform: scale(1); }
        }
        .anim-fadeUp  { animation: fadeUp  0.55s ease-out both; }
        .anim-fadeIn  { animation: fadeIn  0.4s ease-out both; }
        .anim-scaleIn { animation: scaleIn 0.45s ease-out both; }
        .delay-1 { animation-delay: 0.08s; }
        .delay-2 { animation-delay: 0.16s; }
        .delay-3 { animation-delay: 0.24s; }
        .delay-4 { animation-delay: 0.32s; }
        .delay-5 { animation-delay: 0.40s; }
        .delay-6 { animation-delay: 0.48s; }

        .nav-pill { transition: background 0.25s, color 0.25s, transform 0.2s; }

        }

        .tool-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            background: rgba(26,139,139,0.10);
            color: var(--teal);
            border: 1px solid rgba(26,139,139,0.2);
        }

        .progress-track {
            background: #eef0f3;
            border-radius: 99px;
            height: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 99px;
            background: linear-gradient(90deg, var(--teal), #22b8b8);
            transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
        }

        .header-mesh {
            background:
                radial-gradient(ellipse 600px 400px at 80% 40%, rgba(26,139,139,0.13) 0%, transparent 70%),
                radial-gradient(ellipse 400px 300px at 10% 70%, rgba(240,104,76,0.09) 0%, transparent 60%),
                var(--midnight);
        }

        .divider-label {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .divider-label::before,
        .divider-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e6eb;
        }

        .footer-glow {
            background:
                radial-gradient(ellipse 500px 300px at 20% 50%, rgba(26,139,139,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 300px 200px at 90% 80%, rgba(240,104,76,0.08) 0%, transparent 50%),
                var(--midnight);
        }

        .skill-group-title {
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0.45;
            margin-bottom: 8px;
        }

        .skill-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border-radius: 12px;
            background: white;
            border: 1px solid #e8eaed;
            font-size: 12px;
            font-weight: 500;
            color: #374151;
            transition: all 0.2s;
            cursor: default;
        }
        .skill-chip:hover {
            border-color: var(--teal);
            color: var(--teal);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(26,139,139,0.12);
        }
        .skill-chip-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .placeholder-card {
            background: repeating-linear-gradient(
                -45deg,
                #f7f8fa,
                #f7f8fa 8px,
                #f0f1f3 8px,
                #f0f1f3 16px
            );
            border: 2px dashed #d1d5db;
        }

        .about-quote {
            border-left: 3px solid var(--teal);
            padding-left: 20px;
        }

        .video-thumbnail {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 16/9;
            background: #0f1c2e;
        }
        .video-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .video-thumbnail:hover img { transform: scale(1.03); }
        .video-play-btn {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.35);
            transition: background 0.2s;
        }
        .video-thumbnail:hover .video-play-btn { background: rgba(0,0,0,0.2); }
        .play-circle {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        @media (max-width: 768px) {
            .nav-scroll { overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
            .nav-scroll::-webkit-scrollbar { display: none; }
        }
