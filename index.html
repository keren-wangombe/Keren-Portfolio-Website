<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keren Wang'ombe | Technical Leadership Portfolio</title>
    
    <!-- External Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

    <style>
        h1, h2, h3, h4, .serif-font {
            font-family: 'DM Serif Display', serif;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #F7F8FA; /* Cloud Background */
            color: #2C2C2C; /* Graphite Text */
            scroll-behavior: smooth;
        }
        .animate-in {
            animation: fadeIn 0.6s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .selection-theme::selection {
            background-color: #1A8B8B;
            color: white;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #F7F8FA; }
        ::-webkit-scrollbar-thumb { background: #1E2D40; border-radius: 10px; }
    </style>
</head>
<body class="selection-theme">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Custom internal SVG library to prevent icon loading errors
        const Icons = {
            Terminal: (props) => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>,
            Database: (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M3 5V19A9 3 0 0 0 21 19V5"></path><path d="M3 12A9 3 0 0 0 21 12"></path></svg>,
            Target: (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>,
            Layout: (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>,
            ChartLine: (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M3 3v18h18"></path><path d="M19 9l-5 5-4-4-3 3"></path></svg>,
            PenTool: (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m12 19 7-7 3 3-7 7-3-3z"></path><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="m2 2 5 5"></path><path d="m11 8 2 2"></path></svg>,
            MessageSquare: (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>,
            ChevronDown: (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="6 9 12 15 18 9"></polyline></svg>,
            ChevronUp: (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="18 15 12 9 6 15"></polyline></svg>,
            Mail: (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><rect x="2" y="4" width="20" height="16" rx="2"></rect><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path></svg>,
            Download: (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>,
            Linkedin: (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>,
            Github: (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>,
            Award: (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="8" r="6"></circle><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"></path></svg>,
            ArrowUp: (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>,
            Rocket: (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"></path><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"></path><path d="M9 12H4s.55-3.03 2-5c1.62-2.2 5-3 5-3"></path><path d="M12 15v5s.8 3.38 3 5c1.97 1.45 5 2 5 2"></path></svg>,
            Copy: (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>,
            Check: (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="20 6 9 17 4 12"></polyline></svg>
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('landing');
            const [expandedTool, setExpandedTool] = useState(null);
            const [showEmail, setShowEmail] = useState(false);
            const [copied, setCopied] = useState(false);

            const colors = {
                midnight: "#1E2D40",   // Primary
                teal: "#1A8B8B",       // Secondary
                ember: "#F0684C",      // Accent
                cloud: "#F7F8FA",      // Background
                graphite: "#2C2C2C",   // Text
            };

            const toolStack = [
                { name: "Python / SQL", cat: "Data Science", icon: <Icons.Database className="w-5 h-5"/>, impact: "Enables data-driven decision making by transforming raw telemetry into predictive insights.", productivity: "Automates repetitive ETL tasks and report generation, reducing manual analysis time by 60%." },
                { name: "Jira", cat: "Product Mgmt", icon: <Icons.Target className="w-5 h-5"/>, impact: "Maintains clear roadmap visibility and accountability across engineering and product teams.", productivity: "Streamlines sprint planning and issue tracking, ensuring zero-waste cycles." },
                { name: "Asana", cat: "Ops Mgmt", icon: <Icons.Layout className="w-5 h-5"/>, impact: "Provides a single source of truth for high-level program milestones and cross-functional goals.", productivity: "Reduces 'work about work' by automating task handoffs and progress reporting." },
                { name: "Tableau", cat: "Analytics", icon: <Icons.ChartLine className="w-5 h-5"/>, impact: "Democratizes data access for non-technical stakeholders through intuitive visual storytelling.", productivity: "Reduces custom data requests by empowering users with self-service dashboards." },
                { name: "Miro", cat: "Strategy", icon: <Icons.PenTool className="w-5 h-5"/>, impact: "Accelerates the discovery phase by facilitating real-time collaborative brainstorming.", productivity: "Speeds up the transition from ideation to technical specification via visual mapping." },
                { name: "Slack", cat: "Communication", icon: <Icons.MessageSquare className="w-5 h-5"/>, impact: "Cultivates an agile communication culture where blockers are identified instantly.", productivity: "Integrates with technical toolchains to provide real-time alerts." }
            ];

            const handleCopyEmail = () => {
                const email = "kerenwangombe@gmail.com";
                navigator.clipboard.writeText(email).then(() => {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                });
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header Section */}
                    <header style={{ backgroundColor: colors.midnight }} className="pt-16 pb-24 px-6 text-center relative overflow-hidden">
                        <div className="max-w-4xl mx-auto relative z-10">
                            <h1 className="text-4xl md:text-7xl font-normal mb-3 text-white italic">Keren Wang'ombe</h1>
                            <div className="flex items-center justify-center gap-4 mb-6">
                                <div className="h-[1px] w-12" style={{ backgroundColor: colors.teal }}></div>
                                <p className="text-xs md:text-sm text-white font-medium tracking-[0.4em] uppercase opacity-70">Technical Leadership & Strategy</p>
                                <div className="h-[1px] w-12" style={{ backgroundColor: colors.teal }}></div>
                            </div>
                            <p className="max-w-xl mx-auto text-white/50 text-sm md:text-base font-light leading-relaxed tracking-wider">
                                Bridging data-driven insights with scalable operational excellence across high-growth technical ecosystems.
                            </p>
                        </div>
                        <div className="absolute top-0 right-0 w-64 h-64 rounded-full blur-[120px] opacity-10" style={{ backgroundColor: colors.teal }} />
                        <div className="absolute bottom-0 left-0 w-64 h-64 rounded-full blur-[120px] opacity-10" style={{ backgroundColor: colors.ember }} />
                    </header>

                    {/* Navigation - Sticky */}
                    <nav className="max-w-7xl mx-auto -mt-8 px-4 relative z-20 w-full">
                        <div className="bg-white rounded-2xl shadow-2xl border border-slate-200 p-2 flex flex-wrap gap-1">
                            {[
                                { id: 'landing', label: 'TECH STACK', icon: <Icons.Terminal /> },
                                { id: 'pm', label: 'PRODUCT MANAGEMENT' },
                                { id: 'ops', label: 'PROGRAM OPERATIONS' },
                                { id: 'ds', label: 'DATA SCIENCE' },
                                { id: 'community', label: 'COMMUNITY MANAGEMENT' }
                            ].map((tab) => (
                                <button 
                                    key={tab.id}
                                    onClick={() => { setActiveTab(tab.id); setExpandedTool(null); }}
                                    className={`flex-1 min-w-[150px] py-3 px-3 rounded-xl font-bold text-[10px] transition-all flex items-center justify-center gap-2 tracking-widest uppercase ${activeTab === tab.id ? 'text-white shadow-lg' : 'text-slate-400 hover:text-slate-900 hover:bg-slate-50'}`}
                                    style={{ backgroundColor: activeTab === tab.id ? colors.midnight : 'transparent' }}
                                >
                                    {tab.icon} {tab.label}
                                </button>
                            ))}
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto mt-20 px-6 flex-grow w-full mb-24">
                        
                        {/* LANDING PAGE: TECHNICAL INFRASTRUCTURE */}
                        {activeTab === 'landing' && (
                            <div className="animate-in">
                                {/* Impact Metrics Dashboard */}
                                <section className="mb-20">
                                    <div className="flex items-center gap-4 mb-10">
                                        <div className="h-[2px] flex-grow bg-slate-200" />
                                        <h3 className="text-sm font-bold uppercase tracking-[0.3em] text-slate-400">Executive Impact Dashboard</h3>
                                        <div className="h-[2px] flex-grow bg-slate-200" />
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                        {[
                                            { val: "14%", label: "Churn reduction", desc: "Achieved via ML-driven retention engine discovery and launch.", color: colors.teal },
                                            { val: "40%", label: "Velocity Increase", desc: "Realized through automated Jira triage and workflow optimization.", color: colors.ember },
                                            { val: "98%", label: "Model Accuracy", desc: "Statistical validation for high-stakes regional budget allocation.", color: colors.midnight }
                                        ].map((m, i) => (
                                            <div key={i} className="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm text-center hover:shadow-md transition-shadow group">
                                                <p className="text-5xl serif-font mb-2 group-hover:scale-110 transition-transform duration-500" style={{ color: colors.midnight }}>{m.val}</p>
                                                <p className="text-[10px] font-black uppercase tracking-widest mb-3" style={{ color: m.color }}>{m.label}</p>
                                                <p className="text-xs text-slate-500 italic leading-relaxed">{m.desc}</p>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                <div className="mb-14 text-center">
                                    <h2 className="text-4xl md:text-5xl font-normal mb-3 tracking-tight" style={{ color: colors.midnight }}>Technical Infrastructure</h2>
                                    <p className="text-[11px] uppercase tracking-[0.4em] font-bold" style={{ color: colors.teal }}>The specialized engines driving modern enterprise results</p>
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-6xl mx-auto">
                                    {toolStack.map((tool, i) => (
                                        <div key={i} className={`bg-white rounded-3xl border transition-all overflow-hidden ${expandedTool === tool.name ? 'shadow-2xl' : 'border-slate-200 shadow-sm'}`} style={{ borderColor: expandedTool === tool.name ? colors.teal : '' }}>
                                            <button onClick={() => setExpandedTool(expandedTool === tool.name ? null : tool.name)} className="w-full p-8 flex items-center justify-between group">
                                                <div className="flex items-center gap-6">
                                                    <div className="transition-transform group-hover:scale-110" style={{ color: colors.teal }}>{tool.icon}</div>
                                                    <div className="text-left">
                                                        <p className="text-xl serif-font leading-none" style={{ color: colors.midnight }}>{tool.name}</p>
                                                        <p className="text-[9px] uppercase font-bold tracking-widest mt-1 opacity-40">{tool.cat}</p>
                                                    </div>
                                                </div>
                                                {expandedTool === tool.name ? <Icons.ChevronUp className="text-teal-600" /> : <Icons.ChevronDown className="opacity-20 group-hover:opacity-100" />}
                                            </button>
                                            {expandedTool === tool.name && (
                                                <div className="px-8 pb-8 animate-in">
                                                    <div className="pt-6 border-t border-slate-100 space-y-6">
                                                        <div>
                                                            <p className="text-[10px] font-black uppercase tracking-[0.2em] mb-2" style={{ color: colors.ember }}>[01] Strategic Impact</p>
                                                            <p className="text-sm font-normal leading-relaxed text-slate-600 italic">{tool.impact}</p>
                                                        </div>
                                                        <div>
                                                            <p className="text-[10px] font-black uppercase tracking-[0.2em] mb-2" style={{ color: colors.ember }}>[02] Productivity Output</p>
                                                            <p className="text-sm font-normal leading-relaxed text-slate-600 italic">{tool.productivity}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* DOMAIN PAGES */}
                        {activeTab !== 'landing' && (
                            <div className="animate-in">
                                <div className="flex flex-col md:flex-row items-baseline gap-4 mb-16 border-b pb-8" style={{ borderColor: colors.midnight }}>
                                    <h2 className="text-4xl md:text-5xl font-normal tracking-tight italic uppercase" style={{ color: colors.midnight }}>
                                        {activeTab === 'pm' ? "Product Management" : 
                                         activeTab === 'ops' ? "Program Operations" : 
                                         activeTab === 'ds' ? "Data Science" : 
                                         "Community Management"}
                                    </h2>
                                    <span className="text-white font-bold text-[10px] uppercase tracking-[0.3em] px-4 py-1.5 rounded-full" style={{ backgroundColor: colors.teal }}>Domain Vertical</span>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-16">
                                    <div className="lg:col-span-1">
                                        <h3 className="text-[11px] font-bold uppercase mb-10 tracking-[0.4em]" style={{ color: colors.teal }}>Core Competencies</h3>
                                        <div className="space-y-12">
                                            <div className="group border-l-4 pl-6 transition-colors" style={{ borderColor: colors.midnight }}>
                                                <p className="text-2xl font-normal mb-1 serif-font">Strategic Frameworks</p>
                                                <p className="text-sm font-light leading-relaxed opacity-60">High-fidelity mapping and tactical execution for {activeTab} workflows.</p>
                                            </div>
                                            <div className="group border-l-4 pl-6 transition-colors" style={{ borderColor: colors.midnight }}>
                                                <p className="text-2xl font-normal mb-1 serif-font">Technical Lifecycle</p>
                                                <p className="text-sm font-light leading-relaxed opacity-60">End-to-end management of complex technical assets and organizational processes.</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="lg:col-span-2 space-y-8">
                                        <div className="bg-white p-12 rounded-[2.5rem] shadow-2xl border border-slate-100 relative overflow-hidden group">
                                            <div className="relative z-10">
                                                <span className="px-4 py-1 text-white text-[9px] font-bold uppercase tracking-widest rounded-full mb-10 inline-block" style={{ backgroundColor: colors.midnight }}>Project Brief</span>
                                                <h4 className="text-3xl md:text-5xl font-normal mb-6 tracking-tight text-slate-800 italic uppercase">
                                                    {activeTab === 'pm' && "Predictive Retention Engine"}
                                                    {activeTab === 'ops' && "Global QA Lifecycle Revamp"}
                                                    {activeTab === 'ds' && "Revenue Predictor Model"}
                                                    {activeTab === 'community' && "Scale & Retention Framework"}
                                                </h4>
                                                <p className="text-lg mb-12 font-light leading-relaxed max-w-xl italic border-l-8 pl-8" style={{ color: colors.graphite, borderColor: colors.ember }}>
                                                    {activeTab === 'pm' && "Discovery and launch of an ML-driven dashboard for CS teams to identify at-risk accounts."}
                                                    {activeTab === 'ops' && "Replaced manual ticketing with a custom automated triage system powered by Jira and Slack APIs."}
                                                    {activeTab === 'ds' && "Architected a time-series forecasting pipeline to optimize regional budget allocation."}
                                                    {activeTab === 'community' && "Scaled a 10k member base via peer-led technical education and automated onboarding."}
                                                </p>
                                                <div className="flex items-center gap-2 text-xs font-black uppercase tracking-widest text-[#1A8B8B]">
                                                    <Icons.Check className="w-4 h-4" /> Live Production
                                                </div>
                                            </div>
                                            <Icons.Rocket style={{ color: colors.teal }} className="absolute -right-16 -bottom-16 opacity-[0.05] group-hover:rotate-12 transition-transform duration-1000" size={180} />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Connect Footer */}
                    <footer className="max-w-7xl mx-auto px-6 mb-24 w-full">
                        <div style={{ backgroundColor: colors.midnight }} className="p-12 md:p-20 rounded-[3.5rem] text-white flex flex-col md:flex-row gap-16 items-center relative overflow-hidden group shadow-2xl">
                            <div className="flex-1 relative z-10 text-center md:text-left">
                                <h3 className="text-5xl md:text-7xl font-normal mb-8 tracking-tight italic">Connect.</h3>
                                <p className="text-white/60 text-lg mb-12 font-light leading-relaxed max-w-sm tracking-wide">Strategic leadership at the intersection of product, data, and ecosystem growth.</p>
                                <div className="flex flex-col md:items-start items-center gap-6">
                                    <div className="flex flex-wrap justify-center md:justify-start gap-6">
                                        <button onClick={() => setShowEmail(!showEmail)} style={{ backgroundColor: colors.ember }} className="text-white px-10 py-4 rounded-full font-bold uppercase text-[11px] tracking-widest hover:scale-105 transition-all shadow-xl flex items-center gap-2">
                                            <Icons.Mail className="w-4 h-4" /> {showEmail ? 'Close Email' : 'Contact Me'}
                                        </button>
                                        <a href="assets/pdf" className="bg-transparent text-white border-2 border-white/20 px-10 py-4 rounded-full font-bold uppercase text-[11px] tracking-widest hover:bg-white/5 transition-all flex items-center gap-2">
                                            <Icons.Download className="w-4 h-4" /> Download CV
                                        </a>
                                    </div>
                                    {showEmail && (
                                        <div className="p-6 bg-white/10 backdrop-blur-md rounded-2xl border border-white/20 flex flex-col sm:flex-row items-center gap-4 w-full max-w-md animate-in">
                                            <div className="flex-grow text-center sm:text-left">
                                                <p className="text-[10px] font-bold text-[#1A8B8B] uppercase tracking-widest mb-1">Direct Communication</p>
                                                <a href="mailto:kerenwangombe@gmail.com" className="text-lg font-bold hover:text-[#1A8B8B] transition-colors underline decoration-dotted underline-offset-4">kerenwangombe@gmail.com</a>
                                            </div>
                                            <button onClick={handleCopyEmail} className="p-3 bg-white/10 hover:bg-white/20 rounded-xl transition-all group shadow-inner">
                                                {copied ? <Icons.Check className="w-5 h-5 text-green-400" /> : <Icons.Copy className="w-5 h-5 opacity-60" />}
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                            <div className="w-full md:w-1/3 flex flex-col items-center md:items-end justify-center relative z-10">
                                <div className="flex gap-10 mb-12">
                                    <a href="https://www.linkedin.com/in/keren-wangombe/" target="_blank" rel="noopener noreferrer" className="text-white/30 hover:text-white transition-colors" title="LinkedIn Profile"><Icons.Linkedin className="w-10 h-10" /></a>
                                    <a href="#" className="text-white/30 hover:text-white transition-colors" title="GitHub Profile"><Icons.Github className="w-10 h-10" /></a>
                                </div>
                                <p className="text-[10px] font-bold text-white/30 uppercase tracking-[0.5em] text-center md:text-right">Architecture Driven Strategy</p>
                                <p className="text-sm font-normal mt-2 serif-font italic opacity-60 text-[#1A8B8B]">Edition v2.6.0</p>
                            </div>
                        </div>
                    </footer>

                    {/* Ribbon */}
                    <div className="bg-white border-t border-slate-100 py-14 px-8">
