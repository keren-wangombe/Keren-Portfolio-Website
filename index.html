    <style>
        :root {
            --midnight: #1E2D40;
            --teal: #1A8B8B;

            --cloud: #F7F8FA;
            --graphite: #2C2C2C;
        }
        *, *::before, *::after { box-sizing: border-box; }
        h1, h2, h3, h4, .serif { font-family: 'DM Serif Display', serif; }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--cloud);
            color: var(--graphite);
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }
        ::selection { background-color: var(--teal); color: white; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--cloud); }
        ::-webkit-scrollbar-thumb { background: var(--midnight); border-radius: 99px; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.96); }
            to   { opacity: 1; transform: scale(1); }
        }
        .anim-fadeUp  { animation: fadeUp  0.55s ease-out both; }
        .anim-fadeIn  { animation: fadeIn  0.4s ease-out both; }
        .anim-scaleIn { animation: scaleIn 0.45s ease-out both; }
        .delay-1 { animation-delay: 0.08s; }
        .delay-2 { animation-delay: 0.16s; }
        .delay-3 { animation-delay: 0.24s; }
        .delay-4 { animation-delay: 0.32s; }
        .delay-5 { animation-delay: 0.40s; }
        .delay-6 { animation-delay: 0.48s; }

        .nav-pill { transition: background 0.25s, color 0.25s, transform 0.2s; }
        .nav-pill:hover { transform: translateY(-1px); }

        .card-hover { transition: box-shadow 0.3s, transform 0.3s, border-color 0.3s; }
        .card-hover:hover {
            box-shadow: 0 20px 60px -15px rgba(30,45,64,0.15);
            transform: translateY(-3px);
        }
        .metric-card { transition: box-shadow 0.3s, transform 0.3s; }
        .metric-card:hover {
            box-shadow: 0 24px 50px -12px rgba(30,45,64,0.18);
            transform: translateY(-4px);
        }

        .tool-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            background: rgba(26,139,139,0.10);
            color: var(--teal);
            border: 1px solid rgba(26,139,139,0.2);
        }

        .progress-track {
            background: #eef0f3;
            border-radius: 99px;
            height: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 99px;
            background: linear-gradient(90deg, var(--teal), #22b8b8);
            transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
        }

        .header-mesh {
            background:
                radial-gradient(ellipse 600px 400px at 80% 40%, rgba(26,139,139,0.13) 0%, transparent 70%),
                radial-gradient(ellipse 400px 300px at 10% 70%, rgba(240,104,76,0.09) 0%, transparent 60%),
                var(--midnight);
        }

        .divider-label {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .divider-label::before,
        .divider-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e6eb;
        }

        .footer-glow {
            background:
                radial-gradient(ellipse 500px 300px at 20% 50%, rgba(26,139,139,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 300px 200px at 90% 80%, rgba(240,104,76,0.08) 0%, transparent 50%),
                var(--midnight);
        }

        .skill-group-title {
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0.45;
            margin-bottom: 8px;
        }

        .skill-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border-radius: 12px;
            background: white;
            border: 1px solid #e8eaed;
            font-size: 12px;
            font-weight: 500;
            color: #374151;
            transition: all 0.2s;
            cursor: default;
        }
        .skill-chip:hover {
            border-color: var(--teal);
            color: var(--teal);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(26,139,139,0.12);
        }
        .skill-chip-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .placeholder-card {
            background: repeating-linear-gradient(
                -45deg,
                #f7f8fa,
                #f7f8fa 8px,
                #f0f1f3 8px,
                #f0f1f3 16px
            );
            border: 2px dashed #d1d5db;
        }

        .about-quote {
            border-left: 3px solid var(--teal);
            padding-left: 20px;
        }

        .video-thumbnail {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 16/9;
            background: #0f1c2e;
        }
        .video-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .video-thumbnail:hover img { transform: scale(1.03); }
        .video-play-btn {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.35);
            transition: background 0.2s;
        }
        .video-thumbnail:hover .video-play-btn { background: rgba(0,0,0,0.2); }
        .play-circle {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .case-study-drawer {
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.4s ease;
            max-height: 0;
            opacity: 0;
        }
        .case-study-drawer.open {
            max-height: 9000px;
            opacity: 1;
        }
        .sql-block {
            background: #0f1c2e;
            border-radius: 10px;
            padding: 16px 20px;
            overflow-x: auto;
            margin: 12px 0;
        }
        .sql-block code {
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            line-height: 1.7;
            color: #a8d8ea;
            white-space: pre;
        }
        .sql-keyword { color: #f06a6a; font-weight: 700; }
        .sql-comment { color: #5a7a99; font-style: italic; }
        .sql-string { color: #98d8a8; }
        .insight-box {
            background: rgba(26,139,139,0.06);
            border-left: 3px solid #1A8B8B;
            border-radius: 0 8px 8px 0;
            padding: 10px 14px;
            margin: 8px 0 16px 0;
            font-size: 12px;
            color: #374151;
            line-height: 1.6;
        }
        .cs-section-title {
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #94a3b8;
            margin: 24px 0 10px 0;
        }
        .cs-h3 {
            font-size: 14px;
            font-weight: 700;
            color: #1E2D40;
            margin: 18px 0 6px 0;
        }
        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 2px solid transparent;
            width: 100%;
            text-align: left;
            background: transparent;
            border-top: none;
            border-right: none;
            border-bottom: none;
        }
        .sidebar-item:hover { background: rgba(30,45,64,0.05); }
        .section-divider {
            height: 1px;
            background: #e2e6eb;
            margin: 64px 0;
        }

            .sidebar-col { display: none !important; }

        }
        @media (min-width: 769px) {
            .mobile-nav-strip { display: none !important; }
        }

            .nav-scroll { overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }

            sections: [
                {
                    title: "The Problem",
                    content: "The support team had ticket data but no analytical layer. Managers couldn't answer basic questions: which issue types breach SLA most? Which agents are overloaded? Are tickets bouncing between agents unnecessarily? This audit was built to answer all of those questions systematically using SQL."
                },

                    title: "The Queries — With Insights"
                }
            ],
            queries: [
                {
                    title: "1. Which ticket categories drive the highest SLA breach rates?",
                    insight: "Identifies which issue categories (e.g. Billing, Account Access) are consistently breaching SLA and contributing to customer dissatisfaction.",
                    sql: `SELECT 
    category,
    COUNT(*) AS total_tickets,
    SUM(CASE 
        WHEN resolved_at > created_at + INTERVAL 5 DAY 
        THEN 1 ELSE 0 END) AS sla_breaches,
    ROUND(100.0 * SUM(CASE 
        WHEN resolved_at > created_at + INTERVAL 5 DAY 
        THEN 1 ELSE 0 END) / COUNT(*), 2) AS breach_rate_percent
FROM tickets
WHERE status = 'Closed'
GROUP BY category
ORDER BY breach_rate_percent DESC;`
                },
                {
                    title: "2. How does resolution time vary across teams, regions, and issue types?",
                    insight: "Surfaces delays by region, team, and issue type to target training or workflow improvements.",
                    sql: `SELECT 
    a.team, a.region, t.category,
    ROUND(AVG(TIMESTAMPDIFF(HOUR, t.created_at, t.resolved_at)), 2) AS avg_resolution_hours,
    COUNT(*) AS ticket_count
FROM agents a
JOIN tickets t ON t.agent_id = a.agent_id
WHERE t.status = 'Closed' AND t.resolved_at IS NOT NULL
GROUP BY a.team, a.region, t.category
ORDER BY avg_resolution_hours DESC;`
                },
                {
                    title: "3. What percentage of tickets are unresolved beyond SLA thresholds?",
                    insight: "Aged tickets beyond 14 days are red flags for backlogs and SLA non-compliance.",
                    sql: `SELECT 
    COUNT(*) AS total_open_tickets,
    SUM(CASE WHEN created_at < NOW() - INTERVAL 14 DAY THEN 1 ELSE 0 END) AS overdue_tickets,
    ROUND(100.0 * SUM(CASE 
        WHEN created_at < NOW() - INTERVAL 14 DAY THEN 1 ELSE 0 END) / COUNT(*), 2) AS overdue_percent
FROM tickets
WHERE status IN ('Open', 'In Progress');`
                },
                {
                    title: "4. How many tickets are bouncing between multiple agents?",
                    insight: "Flags poor ownership or collaboration breakdowns that waste time and slow resolution.",
                    sql: `SELECT 
    tu.ticket_id,
    COUNT(DISTINCT tu.updated_by) AS distinct_agents
FROM tickets t
JOIN ticket_updates tu ON t.ticket_id = tu.ticket_id
WHERE t.status = 'Closed'
GROUP BY tu.ticket_id
HAVING COUNT(DISTINCT tu.updated_by) > 1;`
                },
                {
                    title: "5. What is the average time to first response per agent?",
                    insight: "Early response is critical. This reveals inconsistencies fixable with training or SOP changes.",
                    sql: `WITH first_responses AS (
    SELECT t.ticket_id, t.agent_id,
        MIN(tu.timestamp) AS first_response_time, t.created_at
    FROM tickets t
    JOIN ticket_updates tu ON t.ticket_id = tu.ticket_id
    GROUP BY t.ticket_id, t.agent_id, t.created_at
)
SELECT a.name, a.team, a.region,
    ROUND(AVG(TIMESTAMPDIFF(MINUTE, fr.created_at, fr.first_response_time)), 2) AS avg_first_response_minutes
FROM first_responses fr
JOIN agents a ON fr.agent_id = a.agent_id
GROUP BY a.agent_id, a.name, a.team, a.region
ORDER BY avg_first_response_minutes DESC;`

                    title: "6. Which customers have submitted more than 3 tickets?",
                    insight: "Identifies high-frequency users — useful for targeted feedback or account reviews.",
                    sql: `SELECT c.customer_id, c.name, COUNT(t.ticket_id) AS ticket_count,

JOIN customers c ON t.customer_id = c.customer_id
GROUP BY c.customer_id, c.name, c.region, c.subscription_plan
HAVING COUNT(t.ticket_id) > 3
ORDER BY ticket_count DESC;`

            sections: [
                {
                    title: "The Problem",
                    content: "Maji Ndogo's water authority had survey data on thousands of water sources across the country — but the data had quality issues, inconsistencies between auditor reports and employee reports, and suspected corruption in some survey entries. The goal was to use SQL to clean the data, identify the discrepancies, surface which employees had suspicious patterns, and produce analysis ready for leadership decisions."
                },
                {
                    title: "What the SQL Does",
                    content: "The project uses a chain of CTEs to progressively build up the analysis — starting with raw discrepancy detection and culminating in identifying specific employees whose error rates exceed the average, suggesting systematic rather than accidental reporting issues."
                }
            ],
            queries: [
                {
                    title: "Checking auditor report vs employee report — finding discrepancies",
                    insight: "Identifies all sites where the auditor's water quality score does not match the employee's reported score — the foundation of the entire integrity audit.",
                    sql: `WITH incorrect_records AS (
    SELECT ar.location_id,
        ar.true_water_source_score AS auditor_score,
        wq.subjective_quality_score AS surveyor_score,
        v.record_id, ar.statements
    FROM md_water_services.visits v
    JOIN md_water_services.water_quality wq ON v.record_id = wq.record_id
    JOIN md_water_services.auditor_report ar ON v.location_id = ar.location_id
    WHERE ar.true_water_source_score != wq.subjective_quality_score
    AND v.visit_count = 1
)`
                },
                {
                    title: "Identifying which employees made the errors",
                    insight: "Joins the discrepancy list to the employee table to find out which surveyors were responsible for the mismatched records.",
                    sql: `employee_error AS (
    SELECT ar.location_id,
        ar.true_water_source_score AS auditor_score,
        wq.subjective_quality_score AS surveyor_score,
        v.record_id, e.employee_name
    FROM md_water_services.visits v
    JOIN md_water_services.employee e 
        ON v.assigned_employee_id = e.assigned_employee_id
    JOIN md_water_services.auditor_report ar ON v.location_id = ar.location_id
    JOIN md_water_services.water_quality wq ON v.record_id = wq.record_id
    WHERE ar.true_water_source_score != wq.subjective_quality_score
    AND v.visit_count = 1
)`
                },
                {
                    title: "Flagging employees with above-average error rates",
                    insight: "Calculates the average error count across all employees and flags those exceeding it — the suspect list for further investigation.",
                    sql: `error_count AS (
    SELECT employee_name, COUNT(*) AS number_of_mistakes
    FROM employee_error
    GROUP BY employee_name
),
avg_error_count AS (
    SELECT AVG(number_of_mistakes) AS avg_error_count_per_empl
    FROM error_count
)
SELECT ec.employee_name, ec.number_of_mistakes
FROM error_count ec
JOIN avg_error_count ae
    ON ec.number_of_mistakes > ae.avg_error_count_per_empl;`
                }
            ],

            externalUrl: "https://github.com/Kerenyambura/SQL/blob/main/project_part_3.sql"

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
